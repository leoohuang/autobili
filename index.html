<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自媒体团队排期系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=DM+Sans:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Media Ops</p>
          <h1>自媒体团队排期系统</h1>
          <p class="sidebar-copy">
            把选题、人员、发布时间和制作节点放到同一套视图里。
          </p>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-button active" data-view="dashboard">总览</button>
          <button class="nav-button" data-view="topics">选题库</button>
          <button class="nav-button" data-view="calendar">日历看板</button>
          <button class="nav-button" data-view="team">团队成员</button>
        </nav>

        <section class="sidebar-card">
          <p class="card-label">本周建议</p>
          <div id="weeklyFocus" class="weekly-focus"></div>
        </section>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">排期中心</p>
            <h2 id="pageTitle">总览</h2>
          </div>
          <button id="resetDemoData" class="ghost-button">重置示例数据</button>
        </header>

        <section id="dashboardView" class="view active">
          <div class="hero-panel">
            <div>
              <p class="eyebrow">团队节奏</p>
              <h3>本周内容生产一眼看清</h3>
            </div>
            <p class="hero-copy">
              查看待定选题、制作中的项目、即将发布内容，以及每位成员当前的工作负载。
            </p>
          </div>

          <div id="statsGrid" class="stats-grid"></div>

          <div class="two-column">
            <section class="panel">
              <div class="section-head">
                <div>
                  <p class="card-label">流程推进</p>
                  <h3>选题进度看板</h3>
                </div>
              </div>
              <div id="pipelineBoard" class="pipeline-board"></div>
            </section>

            <section class="panel">
              <div class="section-head">
                <div>
                  <p class="card-label">未来七天</p>
                  <h3>即将到期节点</h3>
                </div>
              </div>
              <div id="deadlineList" class="deadline-list"></div>
            </section>
          </div>
        </section>

        <section id="topicsView" class="view">
          <div class="two-column topic-layout">
            <section class="panel">
              <div class="section-head">
                <div>
                  <p class="card-label">新增选题</p>
                  <h3>录入选题信息</h3>
                </div>
              </div>
              <form id="topicForm" class="form-grid">
                <label>
                  选题名称
                  <input name="title" required placeholder="例如：AI 工具测评合集" />
                </label>
                <label>
                  内容类型
                  <select name="contentType">
                    <option>短视频</option>
                    <option>图文</option>
                    <option>直播</option>
                    <option>长视频</option>
                    <option>播客</option>
                  </select>
                </label>
                <label>
                  优先级
                  <select name="priority">
                    <option>高</option>
                    <option selected>中</option>
                    <option>低</option>
                  </select>
                </label>
                <label>
                  所属栏目
                  <input name="series" placeholder="例如：运营复盘" />
                </label>
                <label>
                  负责人
                  <select name="ownerId" id="topicOwnerSelect"></select>
                </label>
                <label>
                  发布时间
                  <input type="date" name="publishDate" required />
                </label>
                <label class="full-span">
                  标签
                  <input name="tags" placeholder="用中文逗号分隔，例如：热点，AI，干货" />
                </label>
                <label class="full-span">
                  选题备注
                  <textarea
                    name="summary"
                    rows="4"
                    placeholder="简述目标受众、核心亮点、预期转化"
                  ></textarea>
                </label>
                <button type="submit" class="primary-button">加入选题库</button>
              </form>
            </section>

            <section class="panel">
              <div class="section-head section-head-wrap">
                <div>
                  <p class="card-label">内容池</p>
                  <h3>选题库列表</h3>
                </div>
                <div class="filter-row">
                  <select id="statusFilter"></select>
                  <select id="ownerFilter"></select>
                </div>
              </div>
              <div id="topicsTable" class="topics-table"></div>
            </section>
          </div>
        </section>

        <section id="calendarView" class="view">
          <section class="panel">
            <div class="section-head section-head-wrap">
              <div>
                <p class="card-label">发布视图</p>
                <h3>内容日历</h3>
              </div>
              <div class="calendar-controls">
                <button id="prevMonth" class="ghost-button">上个月</button>
                <strong id="calendarLabel"></strong>
                <button id="nextMonth" class="ghost-button">下个月</button>
              </div>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </section>
        </section>

        <section id="teamView" class="view">
          <div class="two-column">
            <section class="panel">
              <div class="section-head">
                <div>
                  <p class="card-label">成员目录</p>
                  <h3>相关人员</h3>
                </div>
              </div>
              <div id="teamGrid" class="team-grid"></div>
            </section>

            <section class="panel">
              <div class="section-head">
                <div>
                  <p class="card-label">任务分布</p>
                  <h3>成员负载与节点</h3>
                </div>
              </div>
              <div id="workloadList" class="workload-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <template id="topicCardTemplate">
      <article class="topic-card">
        <div class="topic-card-top">
          <div>
            <h4 class="topic-title"></h4>
            <p class="topic-meta"></p>
          </div>
          <span class="priority-badge"></span>
        </div>
        <p class="topic-summary"></p>
        <div class="tag-row"></div>
        <div class="topic-footer">
          <span class="status-pill"></span>
          <div class="topic-actions"></div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
